<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#378ADD"/>

  <!-- Penguin body -->
  <ellipse cx="96" cy="110" rx="32" ry="42" fill="#1F2937"/>

  <!-- Penguin belly -->
  <ellipse cx="96" cy="115" rx="20" ry="30" fill="#FFFFFF"/>

  <!-- Penguin head -->
  <circle cx="96" cy="70" r="28" fill="#1F2937"/>

  <!-- Penguin beak -->
  <polygon points="96,70 86,78 106,78" fill="#F59E0B"/>

  <!-- Penguin eyes -->
  <circle cx="86" cy="65" r="6" fill="#FFFFFF"/>
  <circle cx="106" cy="65" r="6" fill="#FFFFFF"/>
  <circle cx="86" cy="65" r="3" fill="#000000"/>
  <circle cx="106" cy="65" r="3" fill="#000000"/>

  <!-- Penguin flippers -->
  <ellipse cx="65" cy="95" rx="12" ry="6" fill="#1F2937" transform="rotate(-30 65 95)"/>
  <ellipse cx="127" cy="95" rx="12" ry="6" fill="#1F2937" transform="rotate(30 127 95)"/>

  <!-- Penguin feet -->
  <ellipse cx="86" cy="152" rx="10" ry="6" fill="#F59E0B"/>
  <ellipse cx="106" cy="152" rx="10" ry="6" fill="#F59E0B"/>

  <!-- North star -->
  <polygon points="96,20 98,28 106,28 100,32 102,40 96,36 90,40 92,32 86,28 94,28" fill="#FBBF24"/>
</svg>